---
- name: Ensure Debian-based system
  ansible.builtin.fail:
    msg: "This playbook only supports Debian-based systems"
  when: ansible_os_family != "Debian"

- name: Update apt cache and upgrade packages
  ansible.builtin.apt:
    update_cache: true
    upgrade: dist
    cache_valid_time: 3600

- name: Check for official package repositories list
  ansible.builtin.stat:
    path: /etc/apt/sources.list.d/official-package-repositories.list
  register: official_repos

- name: Enable contrib and non-free repositories
  ansible.builtin.replace:
    path: /etc/apt/sources.list.d/official-package-repositories.list
    regexp: '^(deb.*\s)main(\s*)$'
    replace: '\1main contrib non-free non-free-firmware\2'
  when: official_repos.stat.exists

- name: Update apt cache after repository changes
  ansible.builtin.apt:
    update_cache: true

- name: Install prerequisite packages
  ansible.builtin.apt:
    name:
      - curl
      - wget
      - gnupg2
      - ca-certificates
      - lsb-release
      - apt-transport-https
      - software-properties-common
      - dirmngr
      - unzip
      - file
    state: present
