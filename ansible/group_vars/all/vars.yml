---
# -----------------------------------------------------------------------------
# Environment
# -----------------------------------------------------------------------------
target_user: "{{ ansible_env.USER }}"
target_home: "{{ ansible_env.HOME }}"
debian_codename: "{{ ansible_distribution_release | default('bookworm') }}"

# -----------------------------------------------------------------------------
# Third-party apt repositories (legacy one-line .list format)
# -----------------------------------------------------------------------------
apt_repositories:
  - name: vscode
    gpg_url: https://packages.microsoft.com/keys/microsoft.asc
    gpg_dest: /usr/share/keyrings/microsoft-archive-keyring.gpg
    repo_line: "deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft-archive-keyring.gpg] https://packages.microsoft.com/repos/code stable main"

  - name: tailscale
    gpg_url: https://pkgs.tailscale.com/stable/debian/bookworm.noarmor.gpg
    gpg_dest: /usr/share/keyrings/tailscale-archive-keyring.gpg
    repo_line: "deb [signed-by=/usr/share/keyrings/tailscale-archive-keyring.gpg] https://pkgs.tailscale.com/stable/debian bookworm main"

  - name: k6
    gpg_url: https://dl.k6.io/key.gpg
    gpg_dest: /usr/share/keyrings/k6-archive-keyring.gpg
    repo_line: "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main"

  - name: github-cli
    gpg_url: https://cli.github.com/packages/githubcli-archive-keyring.gpg
    gpg_dest: /etc/apt/keyrings/githubcli-archive-keyring.gpg
    repo_line: "deb [arch=amd64 signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main"

  - name: git-lfs
    gpg_url: https://packagecloud.io/github/git-lfs/gpgkey
    gpg_dest: /etc/apt/keyrings/github_git-lfs-archive-keyring.gpg
    repo_line: "deb [arch=amd64 signed-by=/etc/apt/keyrings/github_git-lfs-archive-keyring.gpg] https://packagecloud.io/github/git-lfs/debian/ bookworm main"

  - name: kitware
    gpg_url: https://apt.kitware.com/keys/kitware-archive-latest.asc
    gpg_dest: /usr/share/keyrings/kitware-archive-keyring.gpg
    repo_line: "deb [signed-by=/usr/share/keyrings/kitware-archive-keyring.gpg] https://apt.kitware.com/ubuntu/ noble main"

  - name: task
    gpg_url: https://dl.cloudsmith.io/public/task/task/gpg.key
    gpg_dest: /usr/share/keyrings/task-task-archive-keyring.gpg
    repo_line: "deb [signed-by=/usr/share/keyrings/task-task-archive-keyring.gpg] https://dl.cloudsmith.io/public/task/task/deb/debian bookworm main"

  - name: intel-oneapi
    gpg_url: https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB
    gpg_dest: /usr/share/keyrings/oneapi-archive-keyring.gpg
    repo_line: "deb [signed-by=/usr/share/keyrings/oneapi-archive-keyring.gpg] https://apt.repos.intel.com/oneapi all main"

  - name: microsoft-prod
    gpg_url: https://packages.microsoft.com/keys/microsoft.asc
    gpg_dest: /usr/share/keyrings/microsoft-prod.gpg
    repo_line: "deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft-prod.gpg] https://packages.microsoft.com/debian/12/prod bookworm main"

  - name: beekeeper-studio
    gpg_url: https://deb.beekeeperstudio.io/beekeeper.key
    gpg_dest: /usr/share/keyrings/beekeeper.gpg
    repo_line: "deb [signed-by=/usr/share/keyrings/beekeeper.gpg] https://deb.beekeeperstudio.io stable main"

  - name: spotify
    gpg_url: https://download.spotify.com/debian/pubkey_5384CE82BA52C83A.asc
    gpg_dest: /etc/apt/trusted.gpg.d/spotify.gpg
    repo_line: "deb https://repository.spotify.com stable non-free"

# -----------------------------------------------------------------------------
# Third-party apt repositories (DEB822 .sources format)
# -----------------------------------------------------------------------------
apt_repositories_deb822:
  - name: docker
    gpg_url: https://download.docker.com/linux/debian/gpg
    gpg_dest: /etc/apt/keyrings/docker.asc
    uris: https://download.docker.com/linux/debian
    suites: bookworm
    components: stable
    architectures: amd64

